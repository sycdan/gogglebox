name: Publish image

# Build, TEST-GATE, and push the production image to GHCR when a VERSION BUMP lands
# on main — tagged with the exact (prerelease) package version. This is the
# only place the image is built: release.yml promotes one of these prebuilt,
# already-tested images, it does not rebuild. No PAT needed — the built-in
# GITHUB_TOKEN has package write scope for this repo.
#
# Tag = the full package version, e.g. 2026.6.29-55527303 (the pre-push hook +
# scripts/bump.sh guarantee main carries a fresh version per publish-worthy change,
# so the tag is unique). `latest` is NOT set here — it tracks releases, set by
# release.yml when it promotes a version to its clean YYYY.M.D tag.
#
# Trigger: a `package.json` change on main. The decision of WHICH file changes are
# publish-worthy lives in the pre-push hook (its image-input list, in lockstep with
# the Dockerfile COPY) — a publish-worthy change is bumped, and a bump edits
# package.json. The `gate` job below then builds ONLY when the version actually
# changed (vs the push's `before` SHA), so a non-bump package.json edit (e.g. a
# dependency tweak) does not publish. Use `workflow_dispatch` to force a build.
on:
  push:
    branches: [main]
    paths:
      - 'package.json'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # owner/repo, lowercased below by metadata-action

jobs:
  # Quick exit: only proceed when this push actually bumped the version. Compares
  # the version at the push's `before` SHA to HEAD; a manual dispatch (no before)
  # always proceeds. This is what makes "trigger on package.json" mean "trigger on
  # a real version bump".
  gate:
    runs-on: ubuntu-latest
    outputs:
      bump: ${{ steps.check.outputs.bump }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          HEAD_VER="$(jq -r .version package.json)"
          if [[ -z "$BEFORE" || "$BEFORE" =~ ^0+$ ]]; then
            echo "manual/initial run — proceeding (HEAD=$HEAD_VER)"
            echo "bump=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          BEFORE_VER="$(git show "$BEFORE:package.json" 2>/dev/null | jq -r .version 2>/dev/null || echo '')"
          if [[ "$HEAD_VER" != "$BEFORE_VER" ]]; then
            echo "version bump $BEFORE_VER -> $HEAD_VER — building"
            echo "bump=true" >> "$GITHUB_OUTPUT"
          else
            echo "package.json changed but version unchanged ($HEAD_VER) — skipping build"
            echo "bump=false" >> "$GITHUB_OUTPUT"
          fi

  # Correctness gate: typecheck + unit tests must be green before the image is
  # built or pushed, so we can never publish a known-broken build.
  test:
    needs: gate
    if: needs.gate.outputs.bump == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run check
      - name: Unit tests
        run: npm test

  # Behavior gate: the full e2e/visual-proof flow suite (e2e/run.mjs, all 14
  # flows) against a freshly-bootstrapped sandbox stack, so a published image
  # is proven to actually work end to end, not just typecheck/unit-test clean.
  # Parallel to `test` (both `needs: gate`) rather than folded into it: `test`
  # stays fast/cheap (no Docker, no Jellyfin) so a quick regression shows up
  # fast, and the two failure signals (unit-test break vs. flow break) stay
  # easy to tell apart in the Actions UI instead of one merged job log. The
  # tradeoff is more concurrent runner minutes, accepted for the clearer signal.
  e2e:
    needs: gate
    if: needs.gate.outputs.bump == 'true'
    runs-on: ubuntu-latest
    # Initial tunable value, not a measured permanent constant: covers sandbox
    # bootstrap (Jellyfin first-run wizard + fixture generation/provisioning)
    # plus all sequential Playwright flows against the sandbox stack. Tighten or
    # raise once real CI timing is known.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # Bring up just the sandbox Jellyfin first — provisioning talks to it
      # directly before the rest of the stack (server/client/proxy) exists.
      - name: Boot sandbox Jellyfin
        run: docker compose -f docker-compose.yml -f docker-compose.sbx.yml up -d jellyfin-sandbox

      - name: Generate sandbox fixtures
        run: docker compose -f docker-compose.yml -f docker-compose.sbx.yml run --rm sandbox-generate

      # Provisioning runs the Jellyfin first-run wizard, creates users/libraries,
      # mints an API key, and emits .env.sbx + config.sbx.json at the repo root —
      # the sbx overlay's server/proof overrides require both to exist.
      - name: Provision sandbox Jellyfin
        run: docker compose -f docker-compose.yml -f docker-compose.sbx.yml run --rm sandbox-provision

      - name: Reset sandbox played-state
        run: docker compose -f docker-compose.yml -f docker-compose.sbx.yml run --rm sandbox-reset

      # Only now do .env.sbx and config.sbx.json exist, so only now can the
      # server/proxy/proof overrides (which mount config.sbx.json and require
      # .env.sbx) come up correctly.
      - name: Bring up sandbox stack
        run: docker compose -f docker-compose.yml -f docker-compose.sbx.yml up -d

      # No fixed sleep: poll the client service's own healthcheck (defined in
      # docker-compose.yml) until compose reports it healthy, or fail after a
      # bounded number of attempts.
      - name: Wait for client healthcheck
        run: |
          for i in $(seq 1 60); do
            status="$(docker compose -f docker-compose.yml -f docker-compose.sbx.yml ps --format json client | jq -r '.Health // .State')"
            echo "attempt $i: client status=$status"
            if [[ "$status" == "healthy" ]]; then
              exit 0
            fi
            sleep 5
          done
          echo "client did not become healthy in time"
          docker compose -f docker-compose.yml -f docker-compose.sbx.yml logs client
          exit 1

      # Same-origin proxy target required by player-handoff; all-flows mode
      # (PROOF_FLOW=all) runs every flow in e2e/run.mjs's dispatch order
      # sequentially in one invocation, isolated per-flow (fresh browser/session
      # each flow). A flow's fail() calls process.exit(1) directly, so a broken
      # flow already yields a non-zero exit here with no extra plumbing.
      - name: Run e2e flow suite
        run: docker compose -f docker-compose.yml -f docker-compose.sbx.yml run --rm -e PROOF_URL=http://proxy:8080 -e PROOF_FLOW=all proof

      # Screenshots from a broken CI run, inspectable from the Actions UI.
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: ./artifacts/**
          if-no-files-found: ignore

      # Always tear down, pass or fail, so no dangling containers/volumes are
      # left on the runner.
      - name: Tear down sandbox stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.sbx.yml down -v --remove-orphans

  # No `if` here: publish `needs: [test, e2e]`, and a skipped dependency (either
  # job, when the gate said not a bump) skips this job too. It only runs when
  # both test and e2e ran and passed.
  publish:
    needs: [test, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read package version
        id: pkg
        # The immutable image tag = the exact package version (a prerelease, e.g.
        # 2026.6.29-<ts>). release.yml promotes this tag to its clean release.
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # No `latest` here — release.yml sets latest when it promotes a release.
          tags: |
            type=raw,value=${{ steps.pkg.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
