name: Publish image

# Build the production image and push it to GitHub Container Registry (GHCR).
# Runs on pushes to main and on version tags. No PAT needed — the built-in
# GITHUB_TOKEN has package write scope for this repo.
#
# The `paths` filter keeps a push from rebuilding when nothing that actually goes
# INTO the image changed. Keep this list in lockstep with the Dockerfile's build
# inputs (the COPY sources) — docs, e2e/, scripts/, tools/, compose files, and
# config*.json are NOT in the image and intentionally do not trigger a build.
# Use the manual `workflow_dispatch` to force a build regardless.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # owner/repo, lowercased below by metadata-action

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # latest = rolling newest; yyyymmddhhmmss (UTC) = immutable pin.
          tags: |
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDDHHmmss'}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
