name: Release

# Cut a dated release: stamp the version, build + push the image, tag the repo,
# and publish a GitHub Release — all from one manual run. Use this (not a push
# to main) when you want a pinnable version.
#
# Version scheme is calendar-based: YYYY.M.D (no leading zeros, e.g. 2026.6.28).
# One release per day. A second run the same day hits the collision guard and
# fails loudly before changing anything.
#
# Run it with:  gh workflow run release.yml
on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # owner/repo, lowercased by metadata-action

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the version bump, push the tag, create the release
      packages: write # push the image to GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so --generate-notes has commits to diff

      - name: Compute version
        id: ver
        run: |
          VER="$(date -u +%Y.%-m.%-d)"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Release version: $VER"

      - name: Guard against same-day collision
        env:
          VER: ${{ steps.ver.outputs.version }}
        run: |
          # git tags carry a v prefix (gh convention); the image tag / pin does not.
          if git rev-parse "refs/tags/v$VER" >/dev/null 2>&1; then
            echo "::error::Tag v$VER already exists — already released today. Aborting."
            exit 1
          fi

      - name: Stamp version into package.json and commit
        env:
          VER: ${{ steps.ver.outputs.version }}
        run: |
          npm version "$VER" --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "release: $VER [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.ver.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VER: ${{ steps.ver.outputs.version }}
        run: |
          gh release create "v$VER" \
            --target "$(git rev-parse HEAD)" \
            --title "v$VER" \
            --generate-notes
