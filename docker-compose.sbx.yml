# Sandbox overlay — seeded, deterministic, OFFLINE Jellyfin for testing
# continue-watching features against a REAL Jellyfin with controlled, repeatable
# data, ending the "unit tests pass but real behavior fails" cycle.
#
# Always run on top of the base file. Use the wrapper so you never type -f -f:
#   ./scripts/sbx.sh up -d server client
#   ./scripts/sbx.sh run --rm sandbox-reset
#   PROOF_FLOW=mark-all-watched ./scripts/sbx.sh run --rm proof
#   ./scripts/sbx.sh down
#
# (Equivalent explicit form:
#   docker compose -f docker-compose.yml -f docker-compose.sbx.yml ... )
#
# The model: an immutable library + users + API key persist in named volumes;
# only the mutable per-user played-state is reset between tests.

# Shared base for the sandbox tooling one-shots (generate/provision/reset). Has
# Node + ffmpeg (see tools/sandbox/Dockerfile). Reaches the sandbox Jellyfin on
# the compose network at the fixed hostname jellyfin-sandbox:8096.
x-sandbox-tools: &sandbox-tools
  build:
    context: .
    dockerfile: tools/sandbox/Dockerfile
  working_dir: /app
  volumes:
    - .:/app
    - sandbox_media:/media
  environment:
    - JELLYFIN_URL=http://jellyfin-sandbox:8096
    - MEDIA_ROOT=/media
    - SANDBOX_MEDIA_ROOT=/media

services:
  # --- Offline sandbox Jellyfin -------------------------------------------
  #
  # A deterministic, offline Jellyfin reachable by other services on the compose
  # network at http://jellyfin-sandbox:8096. Provisioning emits .env.sbx +
  # config.sbx.json; the server/proof overrides below feed those values in.
  #
  #   ./scripts/sbx.sh up -d jellyfin-sandbox
  #   ./scripts/sbx.sh run --rm sandbox-generate
  #   ./scripts/sbx.sh run --rm sandbox-provision
  #   ./scripts/sbx.sh run --rm sandbox-reset
  jellyfin-sandbox:
    image: jellyfin/jellyfin:10.9.11
    hostname: jellyfin-sandbox
    # Internal-only by default; uncomment to poke the sandbox UI from the host.
    # ports:
    #   - "8097:8096"
    environment:
      # BaseUrl is /player (set during provisioning); the published URL reflects
      # that base so client-discovered addresses stay under /player.
      - JELLYFIN_PublishedServerUrl=http://jellyfin-sandbox:8096/player
    volumes:
      # Provisioned state (users, libraries, api key) persists across restarts.
      - sandbox_config:/config
      - sandbox_cache:/cache
      # The generated media library (read-only to Jellyfin).
      - sandbox_media:/media:ro

  # One-shot: generate the tiny media library (ffmpeg stubs + .nfo) into the
  # sandbox_media volume. Idempotent; pass FORCE=1 to re-encode.
  sandbox-generate:
    <<: *sandbox-tools
    command: node tools/sandbox/generate-fixtures.mjs

  # One-shot: run the Jellyfin first-run wizard, create users, add libraries
  # (online metadata disabled), scan, mint the api key, emit env+config.
  sandbox-provision:
    <<: *sandbox-tools
    command: node tools/sandbox/provision.mjs
    depends_on:
      - jellyfin-sandbox

  # One-shot: deterministic per-test reset of all users' played-state. Reads the
  # minted api key from .env.sbx (loaded here so the script can authenticate).
  sandbox-reset:
    <<: *sandbox-tools
    command: node tools/sandbox/reset.mjs
    # Layered env: .env (shared base) then .env.sbx (sandbox overrides — the
    # minted JELLYFIN_API_KEY the reset script authenticates with). Later file
    # wins. .env.sbx is required:true here (you can't reset without the minted
    # key); it's generated by sandbox-generate/provision, which don't load it, so
    # first-run bootstrap still works (those services don't validate this list).
    env_file:
      - path: .env
        required: false
      - path: .env.sbx
        required: true
    depends_on:
      - jellyfin-sandbox

  # --- Base services re-pointed at the sandbox ----------------------------
  #
  # These override the SAME service names from the base file so the client's
  # http://server:3000 proxy and the proof's http://client:5173 already resolve
  # by service name — no network-alias surgery needed.
  server:
    # Layered env: .env (shared base) then .env.sbx (sandbox overrides —
    # JELLYFIN_URL/API_KEY + portal creds win over the shared .env). Compose
    # REPLACES the base env_file list for an overridden service, so the full
    # ordered list is restated here. .env.sbx is required:true (the stack can't
    # run without it); generated by sandbox-generate/provision, which don't load
    # it, so first-run bootstrap still works.
    env_file:
      - path: .env
        required: false
      - path: .env.sbx
        required: true
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      # Mount the sandbox household config over the path the server reads. The
      # target is an absolute in-container path, so Git Bash never path-mangles
      # it (a mangled target silently leaves the live config.json in place ->
      # viewers: [] / "Unknown viewer").
      - ./config.sbx.json:/app/config.json:ro
    depends_on:
      deps:
        condition: service_completed_successfully
      jellyfin-sandbox:
        condition: service_started

  # Point the front-door proxy at the sandbox Jellyfin and gate it on that
  # service. The base proxy routes /player/* to {$JELLYFIN_PROXY_UPSTREAM}.
  proxy:
    environment:
      - JELLYFIN_PROXY_UPSTREAM=jellyfin-sandbox:8096
    depends_on:
      - server
      - client
      - jellyfin-sandbox

  proof:
    # Layered env: .env (shared base) then .env.sbx (sandbox Jellyfin creds +
    # portal login for the proof script and seeders, so the flow reads the
    # household group Alice/Bob/Carol/Dave, not gogglebox-admin whose stray
    # played-state would desync the rail). Full ordered list restated because
    # compose replaces the base env_file for an overridden service. .env.sbx is
    # required:true; generated by sandbox-generate/provision (which don't load
    # it), so first-run bootstrap still works.
    env_file:
      - path: .env
        required: false
      - path: .env.sbx
        required: true
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ./artifacts:/app/artifacts
      - ./config.sbx.json:/app/config.json:ro
    # The player-handoff flow runs against the same-origin proxy
    # (PROOF_URL=http://proxy:8080), so the proxy must be up. Restate the base
    # proof deps (compose REPLACES depends_on for an overridden service) and add
    # proxy (service_started). Default `app` flow is unaffected — it still uses
    # the base PROOF_URL (http://client:5173) unless PROOF_URL is overridden.
    depends_on:
      deps:
        condition: service_completed_successfully
      client:
        condition: service_healthy
      proxy:
        condition: service_started

volumes:
  sandbox_config:
  sandbox_cache:
  sandbox_media:
