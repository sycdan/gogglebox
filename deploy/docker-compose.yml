services:
  gogglebox:
    image: ${REGISTRY_HOST:?your docker registry host:port}/gogglebox:${GOGGLEBOX_VERSION:-latest}
    pull_policy: always
    container_name: gogglebox
    restart: unless-stopped
    environment:
      # required
      - JELLYFIN_URL=${JELLYFIN_URL:?required}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:?required}
      - SESSION_SECRET=${SESSION_SECRET:?use a strong secret for production}
      # optional pass-through (only set if present in the env file / shell)
      - WATCHED_THRESHOLD
      - PORTAL_USERNAME
      - PORTAL_PASSWORD
      - PORTAL_AUTO_LOGIN
      - JELLYFIN_DEBUG
    volumes:
      - ./config.json:/app/config.json:ro
      # writable app state; host-mounted so it survives redeploys
      - ${GOGGLEBOX_STATE_DIR:-./data}:/data

  proxy:
    image: caddy:2-alpine
    container_name: gogglebox-proxy
    restart: unless-stopped
    environment:
      - JELLYFIN_PROXY_UPSTREAM=${JELLYFIN_PROXY_UPSTREAM:?required}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "${GOGGLEBOX_PORT:?host port to expose}:8080"
    depends_on:
      - gogglebox
