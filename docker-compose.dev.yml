# Development stack. All app execution (server, client, tests, proof) runs in
# containers so the host only needs Docker. Source is bind-mounted; node_modules
# lives in a named volume to keep the host clean and avoid host/Linux binary
# mismatch.
#
#   docker compose -f docker-compose.dev.yml up -d server client   # run stack
#   docker compose -f docker-compose.dev.yml run --rm check        # typecheck
#   docker compose -f docker-compose.dev.yml run --rm test         # unit tests
#   docker compose -f docker-compose.dev.yml --profile proof run --rm proof
#   docker compose -f docker-compose.dev.yml --profile proof run --rm -e PROOF_FLOW=my-feature proof
#
# server/proof need a real Jellyfin reachable via the values in .env.

x-node: &node
  image: node:22-alpine
  working_dir: /app
  volumes:
    - .:/app
    - node_modules:/app/node_modules

# Shared base for the sandbox tooling one-shots (generate/provision/reset). Has
# Node + ffmpeg (see tools/sandbox/Dockerfile). Reaches the sandbox Jellyfin on
# the compose network at the fixed hostname jellyfin-sandbox:8096.
x-sandbox-tools: &sandbox-tools
  build:
    context: .
    dockerfile: tools/sandbox/Dockerfile
  working_dir: /app
  volumes:
    - .:/app
    - sandbox_media:/media
  environment:
    - JELLYFIN_URL=http://jellyfin-sandbox:8096
    - MEDIA_ROOT=/media
    - SANDBOX_MEDIA_ROOT=/media
  profiles: ["sandbox"]

services:
  # One-shot: populate the node_modules volume. Other services wait on this.
  deps:
    <<: *node
    command: npm ci

  server:
    <<: *node
    command: npm run dev:server
    env_file: .env
    environment:
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      deps:
        condition: service_completed_successfully

  client:
    <<: *node
    command: npm run dev:client
    environment:
      # vite proxies /api to the server service (see vite.config.ts)
      - VITE_API_PROXY=http://server:3000
    ports:
      - "5173:5173"
    # Vite's dep-optimizer cache (cacheDir=/tmp/vite) lives on an ephemeral
    # tmpfs, not the persistent node_modules volume. A half-written cache from a
    # SIGKILL cannot survive a container kill and wedge the next boot.
    tmpfs:
      - /tmp/vite
    # Only healthy once Vite actually serves the app shell. A wedged client
    # (504 Outdated Optimize Dep / blank SPA) keeps returning non-200 and goes
    # unhealthy, which gates the proof service below. start_period covers a cold
    # optimize.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:5173/"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      deps:
        condition: service_completed_successfully

  # Typecheck — no Jellyfin needed. `run --rm check`
  check:
    <<: *node
    command: npm run check
    profiles: ["ci"]
    depends_on:
      deps:
        condition: service_completed_successfully

  # Unit tests — no Jellyfin needed. `run --rm test`
  test:
    <<: *node
    command: npm test
    profiles: ["ci"]
    depends_on:
      deps:
        condition: service_completed_successfully

  # Visual proof: Playwright drives the running client and writes screenshots to
  # ./artifacts. Pass a flow name via PROOF_FLOW (an extra `run` arg would
  # override the service command, so use the env var):
  #   --profile proof run --rm -e PROOF_FLOW=my-feature proof
  proof:
    image: mcr.microsoft.com/playwright:v1.49.0-jammy
    working_dir: /app
    command: node e2e/run.mjs
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ./artifacts:/app/artifacts
    environment:
      - PROOF_URL=http://client:5173
      - PROOF_FLOW=${PROOF_FLOW:-app}
      # household login used by the proof script
      - PORTAL_USERNAME=${PORTAL_USERNAME:?set PORTAL_USERNAME in .env}
      - PORTAL_PASSWORD=${PORTAL_PASSWORD:?set PORTAL_PASSWORD in .env}
      - PORTAL_AUTO_LOGIN=${PORTAL_AUTO_LOGIN:-false}
      # Jellyfin admin creds let flows seed their own fixture data (e.g. an
      # in-progress mid-series episode) so proofs are self-contained.
      - JELLYFIN_URL=${JELLYFIN_URL}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY}
    profiles: ["proof"]
    depends_on:
      deps:
        condition: service_completed_successfully
      # Don't screenshot a blank/unmounted client: wait for the client to serve
      # the app shell before the proof runs.
      client:
        condition: service_healthy

  # --- Offline sandbox Jellyfin (opt-in: --profile sandbox) -----------------
  #
  # A deterministic, offline Jellyfin for testing against a REAL Jellyfin with controlled,
  # repeatable data. Additive + opt-in: normal flows are unaffected unless you target it.
  #
  #   docker compose -f docker-compose.dev.yml --profile sandbox up -d jellyfin-sandbox
  #   docker compose -f docker-compose.dev.yml --profile sandbox run --rm sandbox-generate
  #   docker compose -f docker-compose.dev.yml --profile sandbox run --rm sandbox-provision
  #   docker compose -f docker-compose.dev.yml --profile sandbox run --rm sandbox-reset
  #
  # Reachable by other services on the compose network at http://jellyfin-sandbox:8096.
  # Provisioning emits .env.sandbox + config.sandbox.json; point server/proof at
  # the sandbox by feeding those values in (see tools/sandbox/README.md).
  jellyfin-sandbox:
    image: jellyfin/jellyfin:10.9.11
    hostname: jellyfin-sandbox
    # Internal-only by default; uncomment to poke the sandbox UI from the host.
    # ports:
    #   - "8097:8096"
    environment:
      - JELLYFIN_PublishedServerUrl=http://jellyfin-sandbox:8096
    volumes:
      # Provisioned state (users, libraries, api key) persists across restarts.
      - sandbox_config:/config
      - sandbox_cache:/cache
      # The generated media library (read-only to Jellyfin).
      - sandbox_media:/media:ro
    profiles: ["sandbox"]

  # One-shot: generate the tiny media library (ffmpeg stubs + .nfo) into the
  # sandbox_media volume. Idempotent; pass FORCE=1 to re-encode.
  sandbox-generate:
    <<: *sandbox-tools
    command: node tools/sandbox/generate-fixtures.mjs

  # One-shot: run the Jellyfin first-run wizard, create users, add libraries
  # (online metadata disabled), scan, mint the api key, emit env+config.
  sandbox-provision:
    <<: *sandbox-tools
    command: node tools/sandbox/provision.mjs
    depends_on:
      - jellyfin-sandbox

  # One-shot: deterministic per-test reset of all users' played-state. Reads the
  # minted api key from .env.sandbox (loaded here so the script can authenticate).
  sandbox-reset:
    <<: *sandbox-tools
    command: node tools/sandbox/reset.mjs
    # .env.sandbox is emitted by sandbox-provision; optional so compose can still
    # parse before the first provision run.
    env_file:
      - path: .env.sandbox
        required: false
    depends_on:
      - jellyfin-sandbox

  # --- Sandbox-pointed app stack (server/client/proof against jellyfin-sandbox) -
  #
  # These mirror server/client/proof but point at the offline sandbox Jellyfin,
  # baking in everything the prover previously had to wire by hand:
  #   - env_file: .env.sandbox     (sandbox JELLYFIN_URL/API_KEY + portal creds;
  #                                 overrides the live .env that server uses)
  #   - config.sandbox.json mounted OVER /app/config.json (an in-container target,
  #     so Git Bash never path-mangles it -> server reads the sandbox household,
  #     not the stale live config)
  #   - network alias `server`/`client` so the client's http://server:3000 proxy
  #     and the proof's http://client:5173 resolve without manual network surgery
  #
  # One-command clean proof run (from tools/sandbox/README.md):
  #   docker compose -f docker-compose.dev.yml --profile sandbox run --rm sandbox-reset
  #   docker compose -f docker-compose.dev.yml --profile sandbox up -d server-sandbox client-sandbox
  #   PROOF_FLOW=mark-all-watched docker compose -f docker-compose.dev.yml --profile sandbox run --rm proof-sandbox
  server-sandbox:
    <<: *node
    command: npm run dev:server
    env_file:
      - path: .env.sandbox
        required: false
    environment:
      - PORT=3000
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      # Mount the sandbox household config over the path the server reads. The
      # target is an absolute in-container path, so no host path mangling.
      - ./config.sandbox.json:/app/config.json:ro
    networks:
      default:
        aliases:
          - server
    ports:
      - "3000:3000"
    profiles: ["sandbox"]
    depends_on:
      deps:
        condition: service_completed_successfully
      jellyfin-sandbox:
        condition: service_started

  client-sandbox:
    <<: *node
    command: npm run dev:client
    environment:
      # Proxy /api to the sandbox server (reachable via the `server` alias too).
      - VITE_API_PROXY=http://server-sandbox:3000
    tmpfs:
      - /tmp/vite
    networks:
      default:
        aliases:
          - client
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:5173/"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    profiles: ["sandbox"]
    depends_on:
      deps:
        condition: service_completed_successfully

  proof-sandbox:
    image: mcr.microsoft.com/playwright:v1.49.0-jammy
    working_dir: /app
    command: node e2e/run.mjs
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ./artifacts:/app/artifacts
      # The flow reads the household group from config.json to scope seeders to
      # the sandbox household (Alice/Bob/Carol/Dave), not gogglebox-admin.
      - ./config.sandbox.json:/app/config.json:ro
    # Sandbox Jellyfin creds + portal login for the proof script and seeders.
    env_file:
      - path: .env.sandbox
        required: false
    environment:
      - PROOF_URL=http://client-sandbox:5173
      - PROOF_FLOW=${PROOF_FLOW:-app}
    profiles: ["sandbox"]
    depends_on:
      deps:
        condition: service_completed_successfully
      client-sandbox:
        condition: service_healthy

volumes:
  node_modules:
  sandbox_config:
  sandbox_cache:
  sandbox_media:
